<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zion Sports — Ultimate OTT</title>
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mmzion.github.io/zion-t-sports/">
    <meta property="og:title" content="Zion Sports — FIFA Live Premium">
    <meta property="og:description" content="No Ad, 1080p theater-style sports streaming. Multi-channel FIFA global feed switcher.">
    <meta property="og:image" content="https://i.ibb.co.com/ymJhZWxG/1000075445-clean.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <style>
        /* লাক্সারি ওটিটি ডার্ক থিম */
        body {
            background-color: #04070b;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            padding-top: 60px;
        }

        /* আল্ট্রা-মিনিমাল টপ বার */
        .ott-nav {
            background: rgba(4, 7, 11, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            height: 60px;
            display: flex;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1050;
        }
        .site-brand {
            font-weight: 800;
            font-size: 20px;
            letter-spacing: -0.5px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .site-brand span {
            color: #ef4444;
            font-size: 11px;
            border: 1px solid rgba(239, 68, 68, 0.25);
            padding: 1px 6px;
            border-radius: 4px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .ott-dashboard {
            padding: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ১. বড় ভিডিও প্লেয়ার স্ক্রিন */
        .theater-screen {
            position: relative;
            background: #000;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            width: 100%;
            aspect-ratio: 16 / 9;
        }
        
        .plyr {
            width: 100%;
            height: 100%;
        }

        /* ২. এক্টিভ চ্যানেলের নাম বক্স */
        .stream-details {
            margin-top: 15px;
            background: rgba(13, 18, 28, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.02);
            padding: 14px 16px;
            border-radius: 12px;
        }
        .stream-title { font-size: 18px; font-weight: 700; margin: 0; display: flex; align-items: center; }
        .badge-live { background: #ef4444; color: #fff; font-size: 9px; font-weight: 800; padding: 2px 5px; border-radius: 4px; text-transform: uppercase; margin-right: 10px; letter-spacing: 0.5px;}

        /* ৩. ক্যাটাগরি সিলেক্টর ট্যাব */
        .ott-tabs-wrapper {
            margin-top: 15px;
            background: rgba(13, 18, 28, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 4px;
            border-radius: 10px;
            display: flex;
            gap: 8px;
            max-width: 300px;
        }
        .tab-trigger {
            flex: 1;
            background: transparent;
            color: #64748b;
            border: none;
            padding: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        .tab-trigger.active {
            background: #ef4444;
            color: #fff;
        }

        /* ৪. ৪টি বড় বাটন প্যানেল কন্টেইনার */
        .horizontal-panel {
            margin-top: 15px;
            background: rgba(13, 18, 28, 0.35);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            padding: 15px;
        }

        /* পিসিতে ৪ কলাম লক, মোবাইলে ২ কলাম লেআউট */
        .channel-list-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            width: 100%;
            gap: 12px;
        }

        /* লোগো ও প্লে আইকন বাদে বড় বাটন স্টাইল */
        .channel-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 12px; 
            text-align: center;
            position: relative;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
        }
        .channel-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }
        .channel-card.active {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2) 0%, rgba(239, 68, 68, 0.05) 100%);
            border-color: #ef4444;
            box-shadow: 0 10px 25px -10px rgba(239, 68, 68, 0.3);
        }

        /* শুধু চ্যানেলের নাম থাকবে */
        .card-name { 
            font-weight: 700; 
            font-size: 13.5px; 
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #cbd5e1;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .channel-card.active .card-name {
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.25);
        }
        
        /* লাইভ সিগন্যাল ডট */
        .live-tag-dot {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 6px;
            height: 6px;
            background-color: #ef4444;
            border-radius: 50%;
            animation: blink 1.5s infinite;
            display: none;
        }
        .channel-card.active .live-tag-dot {
            display: block;
        }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* মোবাইল স্ক্রিন সেটিংস (২*২ স্কয়ার গ্রিড লেআউট) */
        @media (max-width: 768px) {
            .channel-list-row {
                grid-template-columns: repeat(2, 1fr); 
                gap: 10px;
            }
            .channel-card { 
                padding: 22px 8px; 
                border-radius: 10px; 
                aspect-ratio: 1.4 / 1; 
            }
            .card-name { font-size: 11px; letter-spacing: 0.5px; }
        }
    </style>
</head>
<body>

    <nav class="ott-nav px-3 px-md-4">
        <div class="site-brand">
            <i class="bi bi-play-hd-fill text-danger"></i> Zion Sports <span>LIVE HUB</span>
        </div>
    </nav>

    <div class="container-fluid ott-dashboard">
        <div class="row">
            <div class="col-12">
                
                <div class="theater-screen">
                    <video id="player" playsinline controls autoplay muted></video>
                </div>
                
                <div class="stream-details">
                    <h1 class="stream-title">
                        <span class="badge-live">Live</span>
                        <span id="activeTitle">Bein Sports Direct — Global Football Feed</span>
                    </h1>
                </div>
                
                <div class="ott-tabs-wrapper">
                    <button class="tab-trigger active" onclick="togglePanelTab('fifa', this)"><i class="bi bi-trophy-fill me-1"></i> FIFA Premium</button>
                    <button class="tab-trigger" onclick="togglePanelTab('iptv', this)"><i class="bi bi-tv-fill me-1"></i> IPTV Beta</button>
                </div>

                <div class="horizontal-panel">
                    
                    <div id="fifaTabPanel" class="channel-list-row">
                        <div class="channel-card active" onclick="switchChannel('https://1nyaler.streamhostingcdn.top/stream/23/index.m3u8', 'Bein Sports Direct — Global Football Feed', this)">
                            <div class="live-tag-dot"></div>
                            <div class="card-name">Bein Direct</div>
                        </div>
                        <div class="channel-card" onclick="switchChannel('https://dfr80qz435crc.cloudfront.net/MNOP/Amagi/Caze/Caze_TV_BR/1080p-vtt/index.m3u8', 'Caze TV — FIFA Broadcast Feed', this)">
                            <div class="live-tag-dot"></div>
                            <div class="card-name">Caze TV Live</div>
                        </div>
                        <div class="channel-card" onclick="switchChannel('https://tvsen5.aynaott.com/PtvSports/index.m3u8', 'PTV Sports — FIFA World Matches', this)">
                            <div class="live-tag-dot"></div>
                            <div class="card-name">PTV Sports</div>
                        </div>
                        <div class="channel-card" onclick="switchChannel('https://1nyaler.streamhostingcdn.top/stream/32/index.m3u8', 'WIN Sports — Premium FIFA Stream', this)">
                            <div class="live-tag-dot"></div>
                            <div class="card-name">WIN Premium</div>
                        </div>
                    </div>

                    <div id="iptvTabPanel" class="channel-list-row d-none">
                        <div class="channel-card" onclick="switchProxyChannel('http://198.195.239.50:8095/tsports/index.m3u8', 'T Sports Live Feed (BDIX Connection Required)', this)">
                            <div class="live-tag-dot"></div>
                            <div class="card-name">T Sports</div>
                        </div>
                        <div class="channel-card" onclick="switchProxyChannel('http://198.195.239.50:8095/starSports1/index.m3u8', 'Star Sports 1 Live Feed (BDIX Connection Required)', this)">
                            <div class="live-tag-dot"></div>
                            <div class="card-name">Star Sports 1</div>
                        </div>
                        <div class="channel-card" onclick="switchProxyChannel('http://198.195.239.50:8095/sonyTenSports1/index.m3u8', 'Sony Ten 1 HD Broadcast (BDIX Connection Required)', this)">
                            <div class="live-tag-dot"></div>
                            <div class="card-name">Sony Ten 1</div>
                        </div>
                        <div class="channel-card" onclick="switchProxyChannel('http://198.195.239.50:8095/somoyTv/index.m3u8', 'Somoy TV Live 24/7 News (BDIX Connection Required)', this)">
                            <div class="live-tag-dot"></div>
                            <div class="card-name">Somoy TV</div>
                        </div>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

    <script>
        let hls = null;
        const video = document.getElementById('player');
        const activeTitle = document.getElementById('activeTitle');

        // Plyr Setup (অটো-অ্যাডাপ্টিভ মোড ব্যাকগ্রাউন্ড লকিং)
        const player = new Plyr(video, {
            autoplay: true,
            muted: true,
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'pip', 'fullscreen']
        });

        // অটো রোটেশন ইঞ্জিন (ল্যান্ডস্কেপ ফুলস্ক্রিন লক)
        player.on('enterfullscreen', () => { if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(e => {}); });
        player.on('exitfullscreen', () => { if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock(); });

        // আল্ট্রা-বাফার হাই-স্পিড HLS কোর ইঞ্জিন
        function playHlsStream(url) {
            if (hls) hls.destroy();

            if (Hls.isSupported()) {
                hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    maxBufferLength: 60,            
                    maxMaxBufferLength: 120,
                    maxBufferSize: 90 * 1024 * 1024,
                    stableBufferSize: 30
                });
                
                hls.loadSource(url);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, function () {
                    hls.currentLevel = -1; // অটো মোড
                    video.play().catch(e => {});
                });

                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR: hls.startLoad(); break;
                            case Hls.ErrorTypes.MEDIA_ERROR: hls.recoverMediaError(); break;
                            default: playHlsStream(url); break;
                        }
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
            }
        }

        // 🛡️ ডিরেক্ট লোকাল BDIX সোর্স পাসার ইঞ্জিন 
        function switchProxyChannel(rawUrl, title, element) {
            activeTitle.textContent = title;
            
            const cards = document.querySelectorAll('.channel-card');
            cards.forEach(card => card.classList.remove('active'));
            element.classList.add('active');

            playHlsStream(rawUrl); // কোনো ইউএসএ প্রক্সি ছাড়া সরাসরি লোকাল আইপি হিট করবে
        }

        // সাধারণ প্রিমিয়াম চ্যানেল রাউটার
        function switchChannel(url, title, element) {
            activeTitle.textContent = title;
            
            const cards = document.querySelectorAll('.channel-card');
            cards.forEach(card => card.classList.remove('active'));
            element.classList.add('active');

            playHlsStream(url);
        }

        // ট্যাব সুইচিং রাউটার
        function togglePanelTab(tabName, buttonElement) {
            const tabs = document.querySelectorAll('.tab-trigger');
            tabs.forEach(t => t.classList.remove('active'));
            buttonElement.classList.add('active');

            if (tabName === 'fifa') {
                document.getElementById('fifaTabPanel').classList.remove('d-none');
                document.getElementById('iptvTabPanel').classList.add('d-none');
            } else {
                document.getElementById('fifaTabPanel').classList.add('d-none');
                document.getElementById('iptvTabPanel').classList.remove('d-none');
            }
        }

        // ডিফল্ট বুট লোডার
        document.addEventListener('DOMContentLoaded', () => {
            playHlsStream('https://1nyaler.streamhostingcdn.top/stream/23/index.m3u8');
        });
    </script>
</body>
</html>
