<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zion Sports — Ultimate OTT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body { background-color: #04070b; color: #f8fafc; font-family: sans-serif; min-height: 100vh; padding-top: 60px; }
        .ott-nav { background: rgba(4, 7, 11, 0.8); backdrop-filter: blur(20px); height: 60px; position: fixed; top: 0; width: 100%; z-index: 1050; display: flex; align-items: center; padding: 0 20px; }
        .theater-screen { position: relative; background: #000; border-radius: 14px; overflow: hidden; width: 100%; aspect-ratio: 16 / 9; }
        #plyr-wrapper, #shaka-wrapper { width: 100%; height: 100%; position: absolute; top:0; left:0; }
        
        /* 🎬 ভিডিও ক্রপিং এবং কন্ট্রোল এরর ফিক্স */
        video { width: 100%; height: 100%; background: #000; object-fit: contain !important; }
        .plyr { width: 100%; height: 100%; }

        .stream-details { margin-top: 15px; background: rgba(13, 18, 28, 0.4); padding: 14px; border-radius: 12px; }
        .badge-live { background: #ef4444; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-right: 8px; text-transform: uppercase; }
        .horizontal-panel { margin-top: 15px; background: rgba(13, 18, 28, 0.4); padding: 15px; border-radius: 14px; }
        
        /* 📑 ট্যাব বাটন স্টাইল */
        .ott-tabs-wrapper { margin-top: 15px; background: rgba(13, 18, 28, 0.6); padding: 4px; border-radius: 10px; display: inline-flex; gap: 8px; }
        .tab-trigger { background: transparent; color: #64748b; border: none; padding: 8px 16px; font-size: 12px; font-weight: 700; text-transform: uppercase; border-radius: 8px; transition: all 0.2s ease; }
        .tab-trigger.active { background: #ef4444; color: #fff; }

        /* 📱 গ্রিড লেআউট */
        .channel-list-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .iptv-grid-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; max-height: 400px; overflow-y: auto; padding-right: 4px; }
        .cat-header-title { grid-column: span 4; font-size: 11px; font-weight: 800; color: #ef4444; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; margin-bottom: 5px; opacity: 0.6; }

        .channel-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; cursor: pointer; text-align: center; aspect-ratio: 1.2/1; display: flex; align-items: center; justify-content: center; border: 1px solid transparent; }
        .channel-card.active { border: 2px solid #ef4444; }
        .drm-card { border: 1px solid rgba(16, 185, 129, 0.4); }
        .drm-card.active { border: 2px solid #10b981; }
        .redirect-card { border: 1px solid rgba(245, 158, 11, 0.3); }
        .redirect-card:hover { border-color: #f59e0b; background: rgba(245, 158, 11, 0.05); }
        
        .card-name { font-weight: 800; font-size: 11px; text-transform: uppercase; }
        .d-none { display: none !important; }

        @media (max-width: 768px) { 
            .channel-list-row { grid-template-columns: repeat(3, 1fr); } 
            .iptv-grid-row { grid-template-columns: repeat(2, 1fr); }
            .cat-header-title { grid-column: span 2; }
        }
    </style>
</head>
<body>

    <nav class="ott-nav"><div class="text-white fw-bold"><i class="bi bi-play-circle text-danger"></i> ZION SPORTS</div></nav>

    <div class="container-fluid ott-dashboard">
        <div class="theater-screen">
            <div id="plyr-wrapper"><video id="player" playsinline controls autoplay muted></video></div>
            <div id="shaka-wrapper" class="d-none"><video id="shaka-video" autoplay playsinline controls></video></div>
        </div>
        
        <div class="stream-details">
            <h1 class="h6 m-0"><span class="badge-live">Live</span><span id="activeTitle">Bein Direct</span></h1>
        </div>

        <div class="ott-tabs-wrapper">
            <button class="tab-trigger active" onclick="togglePanelTab('fifa', this)"><i class="bi bi-trophy-fill me-1"></i> FIFA Premium</button>
            <button class="tab-trigger" onclick="togglePanelTab('iptv', this)"><i class="bi bi-wifi me-1"></i> Only WiFi</button>
        </div>

        <div class="horizontal-panel">
            <div id="fifaTabPanel" class="channel-list-row">
                <div class="channel-card drm-card" onclick="switchDrmChannel('https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeebanglacinema/default/manifest.mpd', 'fbbfd9ce4bbe4d818b16df7dfe89f05b', '1e96d0f88ef740e982d6f6105721c8bc', 'FIFA BANGLA', this)">
                    <div class="card-name">FIFA<br>BANGLA</div>
                </div>
                <div class="channel-card active" onclick="switchStandardChannel('https://1nyaler.streamhostingcdn.top/stream/23/index.m3u8', 'Bein Direct', this)"><div class="card-name">Bein<br>Direct</div></div>
                <div class="channel-card" onclick="switchStandardChannel('https://dfr80qz435crc.cloudfront.net/MNOP/Amagi/Caze/Caze_TV_BR/1080p-vtt/index.m3u8', 'Caze TV', this)"><div class="card-name">Caze<br>TV</div></div>
                <div class="channel-card" onclick="switchStandardChannel('https://tvsen5.aynaott.com/PtvSports/index.m3u8', 'PTV Sports', this)"><div class="card-name">PTV<br>Sports</div></div>
                <div class="channel-card" onclick="switchStandardChannel('https://1nyaler.streamhostingcdn.top/stream/32/index.m3u8', 'WIN Premium', this)"><div class="card-name">WIN<br>Premium</div></div>
            </div>

            <div id="iptvTabPanel" class="iptv-grid-row d-none">
                <div class="cat-header-title">📺 Sports Link Grid</div>
                <div class="channel-card redirect-card" onclick="window.open('http://198.195.239.50:8095/tsports/index.m3u8', '_blank')"><div class="card-name">T Sports<br>(BDIX)</div></div>
                <div class="channel-card redirect-card" onclick="window.open('http://198.195.239.50:8095/starSports1/index.m3u8', '_blank')"><div class="card-name">Star<br>Sports 1</div></div>
                <div class="channel-card redirect-card" onclick="window.open('http://198.195.239.50:8095/starSports2/index.m3u8', '_blank')"><div class="card-name">Star<br>Sports 2</div></div>
                <div class="channel-card redirect-card" onclick="window.open('http://198.195.239.50:8095/starSports3/index.m3u8', '_blank')"><div class="card-name">Star<br>Sports 3</div></div>
                <div class="channel-card redirect-card" onclick="window.open('http://198.195.239.50:8095/starSportsSelect1/index.m3u8', '_blank')"><div class="card-name">Star<br>Select 1</div></div>
                <div class="channel-card redirect-card" onclick="window.open('http://198.195.239.50:8095/starSportsSelect2/index.m3u8', '_blank')"><div class="card-name">Star<br>Select 2</div></div>
                <div class="channel-card redirect-card" onclick="window.open('http://198.195.239.50:8095/sonyTenSports1/index.m3u8', '_blank')"><div class="card-name">Sony<br>Ten 1</div></div>
                <div class="channel-card redirect-card" onclick="window.open('http://198.195.239.50:8095/sonyTenSports2/index.m3u8', '_blank')"><div class="card-name">Sony<br>Ten 2</div></div>
                <div class="channel-card redirect-card" onclick="window.open('http://198.195.239.50:8095/sonyTenSports3/index.m3u8', '_blank')"><div class="card-name">Sony<br>Ten 3</div></div>
                <div class="channel-card redirect-card" onclick="window.open('http://198.195.239.50:8095/sonyTenSports4/index.m3u8', '_blank')"><div class="card-name">Sony<br>Ten 4</div></div>
                <div class="channel-card redirect-card" onclick="window.open('http://198.195.239.50:8095/sonyTenSports5/index.m3u8', '_blank')"><div class="card-name">Sony<br>Ten 5</div></div>
                <div class="channel-card redirect-card" onclick="window.open('http://198.195.239.50:8095/ptv/index.m3u8', '_blank')"><div class="card-name">PTV<br>Feed</div></div>
                <div class="channel-card redirect-card" onclick="window.open('http://198.195.239.50:8095/euroSports/index.m3u8', '_blank')"><div class="card-name">Euro<br>Sports</div></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>

    <script>
        const video = document.getElementById('player');
        const shakaVideo = document.getElementById('shaka-video');
        let hls = null;
        let shakaPlayer = null;

        const plyr = new Plyr(video, { autoplay: true, muted: true });

        // Standard HLS
        function switchStandardChannel(url, title, el) {
            document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('activeTitle').innerText = title;
            
            document.getElementById('shaka-wrapper').classList.add('d-none');
            document.getElementById('plyr-wrapper').classList.remove('d-none');
            
            if(shakaPlayer) shakaPlayer.unload();
            
            if (hls) hls.destroy();
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            video.play();
        }

        // Fixed DRM Shaka
        async function switchDrmChannel(url, keyId, keySecret, title, el) {
            document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('activeTitle').innerText = title;

            if (hls) hls.destroy();
            document.getElementById('plyr-wrapper').classList.add('d-none');
            document.getElementById('shaka-wrapper').classList.remove('d-none');

            if (!shakaPlayer) shakaPlayer = new shaka.Player(shakaVideo);
            shakaPlayer.configure({ drm: { clearKeys: { [keyId]: keySecret } } });
            
            try {
                await shakaPlayer.load(url);
                shakaVideo.play();
            } catch(e) { console.error(e); }
        }

        // 🔄 ট্যাব কন্ট্রোল ফাংশন
        function togglePanelTab(tabName, buttonElement) {
            document.querySelectorAll('.tab-trigger').forEach(t => t.classList.remove('active'));
            buttonElement.classList.add('active');

            if (tabName === 'fifa') {
                document.getElementById('fifaTabPanel').classList.remove('d-none');
                document.getElementById('iptvTabPanel').classList.add('d-none');
            } else {
                document.getElementById('fifaTabPanel').classList.add('d-none');
                document.getElementById('iptvTabPanel').classList.remove('d-none');
            }
        }

        // Boot
        switchStandardChannel('https://1nyaler.streamhostingcdn.top/stream/23/index.m3u8', 'Bein Direct', document.querySelector('.channel-card.active'));
    </script>
</body>
</html>
