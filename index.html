<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zion Sports — FIFA Live Premium</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <style>
        /* Simple Browser & Dark Minimal Theme */
        body {
            background-color: #0b0f14;
            color: #e6eef6;
            font-family: sans-serif;
            padding-top: 60px;
            padding-bottom: 20px;
        }

        /* Simple Top Bar */
        .simple-nav {
            background-color: #0f1720;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1030;
            height: 50px;
            display: flex;
            align-items: center;
        }
        .site-title {
            color: #fff;
            font-weight: 600;
            font-size: 18px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Maximize Player Layout */
        .player-wrapper {
            max-width: 100% !important;
            padding: 0 10px;
        }
        .video-container {
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
        }
        
        /* Plyr Accent (Red Theme) */
        .plyr {
            --plyr-color-main: #dc3545; 
            max-height: 75vh;
        }

        /* Channel Selection Buttons */
        .channel-section {
            margin-top: 15px;
            padding: 0 5px;
        }
        .channel-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }
        .btn-channel {
            background-color: #0f1720;
            color: #e6eef6;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        .btn-channel:hover {
            background-color: #dc3545;
            color: #fff;
            border-color: #dc3545;
        }
        .btn-channel.active {
            background-color: #dc3545;
            color: #fff;
            border-color: #dc3545;
            box-shadow: 0 0 10px rgba(220, 53, 69, 0.4);
        }

        /* Metadata Section */
        .video-meta-section {
            margin-top: 15px;
            padding: 0 5px;
        }
        .video-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .live-indicator {
            background-color: #dc3545;
            color: white;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 3px;
            font-weight: 700;
            text-transform: uppercase;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .video-description {
            font-size: 13px;
            color: rgba(230, 238, 246, 0.7);
            background-color: #0f1720;
            padding: 10px 14px;
            border-radius: 6px;
            margin-top: 10px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
    </style>
</head>
<body>

    <nav class="simple-nav px-3 px-md-4">
        <div class="site-title">
            <i class="bi bi-globe-americas text-danger"></i> Zion Sports
        </div>
    </nav>

    <div class="container-fluid mt-1">
        <div class="player-wrapper">
            
            <div class="video-container">
                <video id="player" playsinline controls autoplay muted></video>
            </div>
            
            <div class="channel-section">
                <h6 class="mb-2 text-muted text-uppercase small" style="letter-spacing: 0.5px;">Select FIFA Live Broadcast</h6>
                <div class="channel-grid">
                    <button class="btn btn-channel active" onclick="switchChannel('https://dfr80qz435crc.cloudfront.net/MNOP/Amagi/Caze/Caze_TV_BR/1080p-vtt/index.m3u8', 'Caze TV — FIFA Broadcast Feed')">Caze TV</button>
                    <button class="btn btn-channel" onclick="switchChannel('https://tvsen5.aynaott.com/PtvSports/index.m3u8', 'PTV Sports — FIFA World Matches')">PTV Sports</button>
                    <button class="btn btn-channel" onclick="switchChannel('https://1nyaler.streamhostingcdn.top/stream/23/index.m3u8', 'Bein Sports 1 — Global Football Feed')">Bein Sports 1</button>
                    <button class="btn btn-channel" onclick="switchChannel('https://1nyaler.streamhostingcdn.top/stream/32/index.m3u8', 'WIN Sports — Premium FIFA Stream')">WIN Sports</button>
                </div>
            </div>

            <div class="video-meta-section">
                <h1 class="video-title">
                    <span class="live-indicator">Live</span>
                    <span id="currentStreamTitle">Caze TV — FIFA Broadcast Feed</span>
                </h1>
                
                <div class="video-description">
                    <strong>Network:</strong> Global Secure CDN &bull; <strong>Features:</strong> FIFA Live Feed Switcher, HD Auto/Manual Quality Controller, Dynamic Buffer Control.
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

    <script>
        let hls = null;
        const video = document.getElementById('player');
        const streamTitleEl = document.getElementById('currentStreamTitle');

        // Plyr Configuration
        const player = new Plyr(video, {
            autoplay: true,
            muted: true,
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'pip', 'fullscreen'],
            settings: ['quality', 'speed'],
            speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] }
        });

        // HLS Engine & Dynamic Quality Level Customizer
        function playHlsStream(url) {
            if (hls) {
                hls.destroy();
            }

            if (Hls.isSupported()) {
                hls = new Hls({
                    maxBufferLength: 30,
                    enableWorker: true,
                    lowLatencyMode: true
                });
                
                hls.loadSource(url);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, function () {
                    const availableQualities = hls.levels.map((l) => l.height);
                    
                    player.config.quality = {
                        default: availableQualities[0],
                        options: availableQualities,
                        forced: true,
                        onChange: (q) => {
                            hls.levels.forEach((level, id) => {
                                if (level.height === q) hls.currentLevel = id; 
                            });
                        }
                    };

                    // Live automatic map to Full HD, HD labels
                    player.on('ready', () => {
                        const qualityMenu = document.querySelectorAll('[data-plyr="quality"]');
                        qualityMenu.forEach(menu => {
                            const labels = menu.querySelectorAll('span');
                            labels.forEach(label => {
                                if (label.textContent === '1080') label.textContent = 'Full HD (1080p)';
                                if (label.textContent === '720') label.textContent = 'HD (720p)';
                                if (label.textContent === '480') label.textContent = 'SD (480p)';
                                if (label.textContent === '360') label.textContent = '360p';
                            });
                        });
                    });
                    
                    video.play().catch(e => console.log("Autoplay:", e));
                });
            } 
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', () => {
                    video.play().catch(e => console.log("Autoplay:", e));
                });
            }
        }

        // Channel switching engine
        function switchChannel(url, title) {
            streamTitleEl.textContent = title;
            
            const buttons = document.querySelectorAll('.btn-channel');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            playHlsStream(url);
        }

        // Initial default boot
        document.addEventListener('DOMContentLoaded', () => {
            const defaultUrl = 'https://dfr80qz435crc.cloudfront.net/MNOP/Amagi/Caze/Caze_TV_BR/1080p-vtt/index.m3u8';
            playHlsStream(defaultUrl);
        });
    </script>
</body>
</html>
