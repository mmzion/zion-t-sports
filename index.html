
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zion T Sports — Live Premium</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <style>
        body {
            background-color: #0f0f0f;
            color: #f1f1f1;
            font-family: "Roboto", "Arial", sans-serif;
            padding-top: 65px;
            padding-bottom: 40px;
        }
        .yt-nav {
            background-color: #0f0f0f;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1030;
            height: 56px;
            display: flex;
            align-items: center;
        }
        .yt-logo {
            color: #fff;
            font-weight: 700;
            font-size: 20px;
            letter-spacing: -0.5px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 66px;
        }
        .yt-logo span {
            background-color: #ff0000;
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .player-wrapper {
            max-width: 1100px;
            margin: 0 auto;
        }
        .video-container {
            border-radius: 12px;
            overflow: hidden;
            background-color: #000;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .plyr {
            --plyr-color-main: #ff0000; 
        }
        .video-meta-section {
            margin-top: 20px;
            padding: 0 4px;
        }
        .video-title {
            font-size: 22px;
            font-weight: 700;
            line-height: 30px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .live-indicator {
            background-color: #ff0000;
            color: white;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .video-description {
            font-size: 14px;
            color: #aaa;
            background-color: #212121;
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 12px;
        }
    </style>
</head>
<body>

    <nav class="yt-nav px-3 px-md-5">
        <a class="yt-logo" href="#">
            <i class="bi bi-play-btn-fill text-danger"></i> Zion T Sports <span>PRO</span>
        </a>
    </nav>

    <div class="container mt-3">
        <div class="player-wrapper">
            <div class="video-container">
                <video id="player" playsinline controls autoplay muted>
                    <track kind="captions" label="English" srclang="en" src="https://cdn.plyr.io/static/demo/View_From_A_Blue_Moon_Chitchat.vtt" default>
                </video>
            </div>
            
            <div class="video-meta-section">
                <h1 class="video-title">
                    <span class="live-indicator">Live</span>
                    Zion T Sports — High Definition Live Streaming
                </h1>
                <div class="video-description">
                    <strong>Broadcaster:</strong> Zion T Sports Network &bull; 
                    <br><small class="text-warning">*Note: দয়া করে নিশ্চিত করুন আপনি আপনার নির্দিষ্ট ISP Bee Online ওয়াইফাই নেটওয়ার্কের সাথে সংযুক্ত আছেন।</small>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('player');
            
            // গিটহাব পেজেস বা লাইভ সার্ভারে Mixed Content সমস্যা এড়াতে প্রোটোকল রিলেটিভ লিংক ব্যবহার করা হয়েছে
            const streamUrl = '//172.16.17.18/stream/hls/ch1.m3u8'; 

            const player = new Plyr(video, {
                autoplay: true,
                muted: true,
                controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'captions', 'settings', 'pip', 'fullscreen'],
                settings: ['quality', 'speed', 'captions'],
                speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] }
            });

            if (Hls.isSupported()) {
                const hls = new Hls({ maxBufferLength: 30, enableWorker: true, lowLatencyMode: true });
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function () {
                    const availableQualities = hls.levels.map((l) => l.height);
                    player.config.quality = {
                        default: availableQualities[0],
                        options: availableQualities,
                        forced: true,
                        onChange: (e) => {
                            hls.levels.forEach((level, id) => { if (level.height === e) hls.currentLevel = id; });
                        }
                    };
                    video.play().catch(e => console.log("Autoplay:", e));
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', () => { video.play().catch(e => console.log("Autoplay:", e)); });
            }
        });
    </script>
</body>
</html>
