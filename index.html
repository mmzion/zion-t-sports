<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zion T Sports — Live Premium</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <style>
        /* সিম্পল ব্রাউজার ও ডার্ক মিনিমাল থিম */
        body {
            background-color: #0b0f14;
            color: #e6eef6;
            font-family: sans-serif;
            padding-top: 60px;
            padding-bottom: 20px;
        }

        /* সিম্পল টপ বার (ইউটিউব লোগো ছাড়া) */
        .simple-nav {
            background-color: #0f1720;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1030;
            height: 50px;
            display: flex;
            align-items: center;
        }
        .site-title {
            color: #fff;
            font-weight: 600;
            font-size: 18px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ম্যাক্সিমাইজড প্লেয়ার লেআউট */
        .player-wrapper {
            max-width: 100% !important;
            padding: 0 10px;
        }
        .video-container {
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
        }
        
        /* Plyr কাস্টমাইজেশন (রেড থিম) */
        .plyr {
            --plyr-color-main: #dc3545; 
            max-height: 80vh;
        }

        /* মেটাডাটা সেকশন */
        .video-meta-section {
            margin-top: 15px;
            padding: 0 5px;
        }
        .video-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .live-indicator {
            background-color: #dc3545;
            color: white;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 3px;
            font-weight: 700;
            text-transform: uppercase;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .video-description {
            font-size: 13px;
            color: rgba(230, 238, 246, 0.7);
            background-color: #0f1720;
            padding: 10px 14px;
            border-radius: 6px;
            margin-top: 10px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
    </style>
</head>
<body>

    <nav class="simple-nav px-3 px-md-4">
        <div class="site-title">
            <i class="bi bi-tv text-danger"></i> Zion T Sports
        </div>
    </nav>

    <div class="container-fluid mt-1">
        <div class="player-wrapper">
            
            <div class="video-container">
                <video id="player" playsinline controls autoplay muted>
                    <track kind="captions" label="English" srclang="en" src="" default>
                </video>
            </div>
            
            <div class="video-meta-section">
                <h1 class="video-title">
                    <span class="live-indicator">Live</span>
                    Zion T Sports — HD Live Stream
                </h1>
                
                <div class="video-description">
                    <strong>Source:</strong> Bee Online ISP Network &bull; <strong>Features:</strong> Manual Quality Selector (Full HD/720p/480p), Speed Control, Picture-in-Picture.
                    <br><small class="text-warning">*Note: এই লোকাল স্ট্রিমটি শুধুমাত্র আপনার নিজস্ব ISP ক্যাশ নেটওয়ার্কের আওতায় সচল থাকবে।</small>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('player');
            
            // আপনার অরিজিনাল লোকাল T Sports লিংক (CORS এবং Mixed Content ফিক্স সহ)
            const streamUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent('http://172.16.17.18/stream/hls/ch1.m3u8'); 

            // প্লেয়ার কন্ট্রোলস
            const player = new Plyr(video, {
                autoplay: true,
                muted: true,
                controls: [
                    'play-large', 'play', 'progress', 'current-time', 
                    'mute', 'volume', 'captions', 'settings', 'pip', 'fullscreen'
                ],
                settings: ['quality', 'speed'],
                speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] }
            });

            // HLS ও কাস্টম রেজুলেশন লেবেল সেটিং
            if (Hls.isSupported()) {
                const hls = new Hls({
                    maxBufferLength: 30,
                    enableWorker: true,
                    lowLatencyMode: true
                });
                
                hls.loadSource(streamUrl);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, function () {
                    // সোর্স থেকে উপলব্ধ রেজুলেশনের উচ্চতা নেওয়া
                    const availableQualities = hls.levels.map((l) => l.height);
                    
                    // প্লেয়ারের কোয়ালিটি অপশন ম্যাপ করা
                    player.config.quality = {
                        default: availableQualities[0],
                        options: availableQualities,
                        forced: true,
                        onChange: (q) => {
                            hls.levels.forEach((level, levelIndex) => {
                                if (level.height === q) {
                                    hls.currentLevel = levelIndex; 
                                }
                            });
                        }
                    };

                    // রেজুলেশনের সংখ্যাগুলোকে টেক্সটে রূপান্তর (Full HD, 720p ইত্যাদি)
                    player.on('ready', () => {
                        const qualityMenu = document.querySelectorAll('[data-plyr="quality"]');
                        qualityMenu.forEach(menu => {
                            const labels = menu.querySelectorAll('span');
                            labels.forEach(label => {
                                if (label.textContent === '1080') label.textContent = 'Full HD (1080p)';
                                if (label.textContent === '720') label.textContent = 'HD (720p)';
                                if (label.textContent === '480') label.textContent = 'SD (480p)';
                                if (label.textContent === '360') label.textContent = '360p';
                            });
                        });
                    });
                    
                    video.play().catch(e => console.log("Autoplay:", e));
                });
            } 
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', () => {
                    video.play().catch(e => console.log("Autoplay:", e));
                });
            }
        });
    </script>
</body>
</html>
