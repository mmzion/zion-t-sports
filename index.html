<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zion Sports — Ultimate OTT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body { background-color: #04070b; color: #fff; font-family: sans-serif; padding-top: 60px; }
        .theater-screen { 
            position: relative; 
            background: #000; 
            border-radius: 14px; 
            overflow: hidden; 
            width: 100%; 
            aspect-ratio: 16 / 9; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* ভিডিও ক্রপিং ফিক্স করার জন্য */
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; /* এটি ভিডিওকে পুরো স্ক্রিনে আনবে কিন্তু ক্রপ করবে না */
            background: #000; 
        }
        .plyr--video { width: 100%; height: 100%; }
        .channel-list-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .channel-card { background: #111; padding: 15px; border-radius: 10px; cursor: pointer; text-align: center; aspect-ratio: 1.2/1; }
        .channel-card.active { border: 2px solid #ef4444; }
        @media (max-width: 768px) { .channel-list-row { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>

    <div class="container-fluid">
        <div class="theater-screen">
            <video id="player" playsinline controls></video>
        </div>
        
        <div class="channel-list-row">
            <div class="channel-card active" onclick="switchChannel('https://1nyaler.streamhostingcdn.top/stream/23/index.m3u8', this)">
                <div class="fw-bold fs-6">BEIN</div>
            </div>
            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script>
        const video = document.getElementById('player');
        const player = new Plyr(video, { 
            controls: ['play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen', 'settings'],
            settings: ['quality', 'speed']
        });

        let hls = new Hls();

        function switchChannel(url, el) {
            document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            
            if (hls) hls.destroy();
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            video.play();
        }
        
        // প্রথম লোড
        hls.loadSource('https://1nyaler.streamhostingcdn.top/stream/23/index.m3u8');
        hls.attachMedia(video);
    </script>
</body>
</html>
