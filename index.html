<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zion TV — Cloud OTT</title>

    <meta property="og:type" content="website">
    <meta property="og:title" content="Zion TV — Cloud OTT Platform">
    <meta property="og:description" content="Watch Live Premium Streams powered by Cloud Backend.">
    <meta property="og:image" content="https://i.ibb.co.com/ymJhZWxG/1000075445-clean.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --purple-primary: #7c3aed;
            --purple-glow: rgba(124, 58, 237, 0.4);
            --purple-bg-dark: #090514;
            --panel-bg: rgba(22, 14, 45, 0.6);
            --card-border: rgba(124, 58, 237, 0.15);
            --font-display: 'Manrope', 'Segoe UI', sans-serif;
            --font-body: 'Inter', 'Segoe UI', Roboto, sans-serif;
        }

        * { box-sizing: border-box; }

        body { 
            background:
                radial-gradient(ellipse 900px 480px at 50% -8%, rgba(124, 58, 237, 0.20), transparent 60%),
                radial-gradient(ellipse 700px 400px at 100% 10%, rgba(236, 72, 153, 0.08), transparent 55%),
                var(--purple-bg-dark) !important;
            background-attachment: fixed;
            color: #f1f5f9 !important; 
            font-family: var(--font-body); 
            min-height: 100vh; 
            margin: 0;
            padding: 0;
        }

        .ott-nav { 
            background: rgba(9, 5, 20, 0.85) !important; 
            backdrop-filter: blur(20px); 
            height: 55px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            padding: 0 15px; 
            border-bottom: 1px solid rgba(124, 58, 237, 0.2); 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            position: sticky;
            top: 0;
            z-index: 2200;
        }
        .ott-nav .brand { font-weight: 800; letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px; }
        .ott-nav .brand i { color: var(--purple-primary); font-size: 18px; }
        .ott-nav .brand-text {
            font-family: var(--font-display);
            font-weight: 800;
            background: linear-gradient(135deg, #d8b4fe, #7c3aed 55%, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .live-counter-badge {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #4ade80;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .counter-dot {
            width: 6px; height: 6px; background: #22c55e; border-radius: 50%;
            animation: pulse-green 1.5s infinite;
        }
        @keyframes pulse-green { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .theater-screen-sticky-wrapper {
            position: -webkit-sticky;
            position: sticky;
            top: 55px;
            z-index: 2090; 
            background: #000;
            width: 100%;
            transition: box-shadow .25s ease;
        }
        .theater-screen-sticky-wrapper.is-stuck { box-shadow: 0 12px 28px rgba(0,0,0,0.85); }

        .theater-screen-sticky-wrapper.mini-player {
            position: fixed !important;
            top: auto !important;
            bottom: 20px;
            right: 10px;
            width: 160px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 28px rgba(0,0,0,0.65);
            border: 1px solid rgba(124, 58, 237, 0.45);
            z-index: 2500;
        }
        .theater-screen-sticky-wrapper.mini-player .theater-screen { aspect-ratio: 16 / 9; }
        .theater-screen-sticky-wrapper.mini-player .plyr__controls,
        .theater-screen-sticky-wrapper.mini-player .unmute-overlay { display: none !important; }

        .mini-player-tap-zone { position: absolute; inset: 0; z-index: 5; display: none; cursor: pointer; background: transparent; }
        .theater-screen-sticky-wrapper.mini-player .mini-player-tap-zone { display: block; }

        .mini-player-close {
            position: absolute; top: 4px; right: 4px; z-index: 6; background: rgba(0,0,0,0.75); color: #fff;
            border: none; width: 20px; height: 20px; border-radius: 50%; display: none; align-items: center;
            justify-content: center; font-size: 10px; cursor: pointer;
        }
        .theater-screen-sticky-wrapper.mini-player .mini-player-close { display: flex; }

        #miniPlayerSentinel { height: 1px; width: 100%; }

        .theater-screen { position: relative; width: 100%; aspect-ratio: 16 / 9; overflow: hidden; background: #000; }
        #plyr-wrapper { width: 100%; height: 100%; position: absolute; top:0; left:0; z-index: 1; }
        video { width: 100% !important; height: 100% !important; background: #000; object-fit: contain !important; }

        .player-loader {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 10px; background: radial-gradient(ellipse at center, rgba(124,58,237,0.08), #000 75%);
            z-index: 3; pointer-events: none; transition: opacity .25s ease;
        }
        .player-loader.hidden { opacity: 0; visibility: hidden; }
        .spinner-ring { width: 36px; height: 36px; border: 3px solid rgba(124, 58, 237, 0.2); border-top-color: var(--purple-primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .player-loader span { font-family: var(--font-display); font-size: 11px; color: #a78bfa; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }

        .unmute-overlay {
            position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); z-index: 4;
            background: rgba(0,0,0,0.7); border: 1px solid rgba(124,58,237,0.5); color: #fff; font-size: 12px;
            font-weight: 600; padding: 7px 16px; border-radius: 30px; cursor: pointer; display: none; align-items: center; gap: 6px; backdrop-filter: blur(6px);
        }
        .unmute-overlay.show { display: inline-flex; }

        .ott-dashboard { padding: 12px; }

        .stream-details { 
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.12), rgba(22, 14, 45, 0.75));
            padding: 10px 14px; border-radius: 12px; border: 1px solid rgba(124, 58, 237, 0.18); display: flex; align-items: center; gap: 12px; position: relative; 
        }
        .active-logo-img { width: 32px; height: 32px; object-fit: contain; border-radius: 6px; background: rgba(255,255,255,0.08); padding: 3px; border: 1px solid rgba(124, 58, 237, 0.3); flex-shrink: 0; }
        #activeTitle { font-family: var(--font-display); font-size: 14px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .badge-live { 
            background: linear-gradient(135deg, #ef4444, #dc2626); color: #fff; font-size: 9px; padding: 3px 7px; border-radius: 4px; text-transform: uppercase; font-weight: bold; flex-shrink: 0; display: flex; align-items: center; gap: 4px;
        }
        .badge-live::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: #fff; animation: pulse-dot 1.4s infinite; }
        @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        .horizontal-panel { margin-top: 12px; background: var(--panel-bg); padding: 12px; border-radius: 14px; border: 1px solid rgba(124, 58, 237, 0.1); }
        .stream-actions { margin-left: auto; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

        .btn-reload-stream {
            background: rgba(124, 58, 237, 0.1); color: #c084fc; border: 1px solid rgba(124, 58, 237, 0.4);
            padding: 6px 12px; font-size: 11px; font-weight: 700; border-radius: 8px; display: flex; align-items: center; gap: 5px; cursor: pointer; flex-shrink: 0; transition: all 0.2s;
        }
        .btn-reload-stream:hover { background: rgba(124, 58, 237, 0.25); }
        .btn-reload-stream.spinning i { animation: spin 0.6s linear; }

        .ott-tabs-wrapper { margin-top: 12px; background: rgba(22, 14, 45, 0.8); padding: 4px; border-radius: 10px; display: inline-flex; gap: 4px; border: 1px solid rgba(124, 58, 237, 0.15); width: 100%; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
        .ott-tabs-wrapper::-webkit-scrollbar { display: none; }
        .tab-trigger { background: transparent; color: #7c7299; border: none; padding: 9px 16px; font-size: 11px; font-weight: 700; text-transform: uppercase; border-radius: 7px; transition: all 0.2s; }
        .tab-trigger.active { background: var(--purple-primary); color: #fff; box-shadow: 0 0 10px var(--purple-glow); }

        .tab-panel-content { width: 100%; display: none; }
        .tab-panel-content.active { display: block; }

        .section-heading { font-family: var(--font-display); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; color: #a78bfa; margin: 14px 0 8px; display: flex; align-items: center; gap: 6px; }
        .section-heading i { color: #f59e0b; }

        .iptv-grid-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; width: 100%; }

        .channel-card { 
            position: relative; background: rgba(255,255,255,0.02); padding: 10px 6px; border-radius: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 6px; aspect-ratio: 1.1 / 1; border: 1px solid var(--card-border); transition: transform 0.2s cubic-bezier(.4,0,.2,1), border-color 0.2s; width: 100%; min-width: 0;
        }
        .channel-card:hover { transform: translateY(-3px); border-color: rgba(124, 58, 237, 0.4); background: rgba(124, 58, 237, 0.05); }
        .channel-card.active { border: 1.5px solid var(--purple-primary); background: rgba(124, 58, 237, 0.12); box-shadow: 0 0 18px rgba(124, 58, 237, 0.3); }
        
        .logo-img { width: 34px; height: 34px; object-fit: contain; border-radius: 6px; padding: 2px; background: rgba(255,255,255,0.04); }
        .card-name { font-weight: 600; font-size: 10px; color: #cbd5e1; text-transform: uppercase; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; width: 100%; }

        .health-dot { position: absolute; top: 6px; right: 6px; width: 7px; height: 7px; border-radius: 50%; }
        .dot-online { background: #22c55e; box-shadow: 0 0 5px #22c55e; }
        .dot-offline { background: #ef4444; }

        .btn-load-more { background: rgba(124, 58, 237, 0.15); border: 1px solid rgba(124, 58, 237, 0.3); color: #c4b5fd; font-size: 12px; font-weight: 700; padding: 10px 24px; border-radius: 8px; width: 100%; margin-top: 15px; cursor: pointer; transition: all 0.2s; }
        .btn-load-more:hover { background: var(--purple-primary); color: #fff; }

        .plyr--video { --plyr-color-main: var(--purple-primary); }

        @media (min-width: 992px) {
            .ott-main-layout { display: grid; grid-template-columns: 60% 40%; gap: 20px; padding: 20px; max-width: 1300px; margin: 0 auto; }
            .left-column-wrapper { position: sticky; top: 75px; z-index: 10; }
            .theater-screen-sticky-wrapper { position: relative; border-radius: 14px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(124, 58, 237, 0.2); top: 0; }
            .horizontal-panel { max-height: calc(100vh - 160px); overflow-y: auto; }
        }
    </style>
</head>
<body>

    <nav class="ott-nav">
        <div class="text-white brand"><i class="bi bi-play-circle"></i> <span class="brand-text">ZION TV</span></div>
        <div class="live-counter-badge"><span class="counter-dot"></span>Online: <span id="globalUserCount">1</span></div>
    </nav>

    <div class="ott-main-layout">
        
        <div class="left-column-wrapper">
            <div class="theater-screen-sticky-wrapper" id="stickyWrapper">
                <div class="theater-screen" id="theaterScreen">
                    <div id="plyr-wrapper">
                        <video id="player" playsinline controls autoplay></video>
                    </div>
                    <div class="player-loader" id="playerLoader">
                        <div class="spinner-ring"></div>
                        <span>Connecting Cloud</span>
                    </div>
                    <button class="unmute-overlay" id="unmuteBtn"><i class="bi bi-volume-mute-fill"></i> Tap to unmute</button>
                    <button class="mini-player-close" id="miniPlayerClose"><i class="bi bi-x-lg"></i></button>
                    <div class="mini-player-tap-zone" id="miniTapZone"></div>
                </div>
            </div>
            
            <div class="stream-details mt-3">
                <span class="badge-live">Live</span>
                <img id="activeLogo" src="" class="active-logo-img" alt="logo" onerror="this.style.display='none'">
                <h1 class="h6 m-0" id="activeTitle">Select a Channel</h1>

                <div class="stream-actions">
                    <button class="btn-reload-stream" id="reloadBtn" onclick="reloadStream()"><i class="bi bi-arrow-clockwise"></i> Reload</button>
                </div>
            </div>
            <div id="miniPlayerSentinel"></div>
        </div>

        <div class="container-fluid ott-dashboard">
            <div class="ott-tabs-wrapper mt-0">
                <button class="tab-trigger active" onclick="switchTab('trending', this)"><i class="bi bi-fire me-1"></i> Trending</button>
                <button class="tab-trigger" onclick="switchTab('all-channels', this)"><i class="bi bi-tv me-1"></i> 6000+ Channels</button>
            </div>

            <div class="horizontal-panel">
                <div id="trendingPanel" class="tab-panel-content active">
                    <div class="section-heading"><i class="bi bi-graph-up-arrow"></i> Real-time Trending Now</div>
                    <div class="iptv-grid-row" id="trendingGrid"></div>
                </div>

                <div id="allChannelsPanel" class="tab-panel-content">
                    <div class="section-heading"><i class="bi bi-hdd-network"></i> Cloud Database</div>
                    <div class="iptv-grid-row" id="allChannelsGrid"></div>
                    <button class="btn-load-more" id="loadMoreBtn" onclick="loadNextBatch()">Load More Channels</button>
                </div>
            </div>
            <div class="text-center mt-5 text-muted" style="font-size: 10px; opacity: 0.3;">© 2026 Zion TV • Powered by Firebase Cloud</div>
        </div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
          "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
        }
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, query, orderBy, limit, startAfter, getDocs, doc, increment, updateDoc, writeBatch } from "firebase/firestore";
        import { getDatabase, ref, set, onValue, onDisconnect, serverTimestamp } from "firebase/database";

        // ⚡ Zion, সিঙ্গাপুর জোনের সঠিক রিয়েল-টাইম ডাটাবেস URL এখানে কনফিগার করা হলো
        const firebaseConfig = {
            apiKey: "AIzaSyAspnAvpfPl3_L25kuTX-U3_Hv6kGA8dk8",
            authDomain: "mmziontv.firebaseapp.com",
            databaseURL: "https://mmziontv-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mmziontv",
            storageBucket: "mmziontv.firebasestorage.app",
            messagingSenderId: "150853898946",
            appId: "1:150853898946:web:2518220fee850e1a5b215b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const rtdb = getDatabase(app);

        const FALLBACK_LOGO = "https://i.ibb.co.com/ymJhZWxG/1000075445-clean.png";
        let hlsPlayer = null;
        let dashPlayer = null;
        let currentChannel = null;
        let lastVisibleDoc = null; 
        const BATCH_LIMIT = 50;

        const video = document.getElementById('player');
        const loader = document.getElementById('playerLoader');
        const unmuteBtn = document.getElementById('unmuteBtn');
        const plyr = new Plyr(video, { autoplay: true, controls: ['play-large', 'play', 'progress', 'mute', 'volume', 'fullscreen'] });

        window.switchTab = function(tabId, btn) {
            document.querySelectorAll('.tab-trigger').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-panel-content').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            if(tabId === 'trending') document.getElementById('trendingPanel').classList.add('active');
            if(tabId === 'all-channels') document.getElementById('allChannelsPanel').classList.add('active');
        };

        // --- Real-time Presence & User Counter System ---
        function setupPresenceTrack(channelName = "Idle") {
            const sessionUserId = "user_" + Math.random().toString(36).substring(2, 11);
            const userRef = ref(rtdb, `onlineUsers/${sessionUserId}`);
            
            set(userRef, {
                channel: channelName,
                lastSeen: serverTimestamp()
            });
            onDisconnect(userRef).remove();
        }

        function listenLiveUsers() {
            const countRef = ref(rtdb, 'onlineUsers');
            onValue(countRef, (snapshot) => {
                const total = snapshot.exists() ? Object.keys(snapshot.val()).length : 1;
                document.getElementById('globalUserCount').innerText = total;
            });
        }

        // --- Stream Loading Engine ---
        window.playChannel = async function(chString) {
            const ch = JSON.parse(decodeURIComponent(chString));
            currentChannel = ch;
            loader.classList.remove('hidden');
            
            document.getElementById('activeTitle').innerText = ch.name;
            document.getElementById('activeLogo').src = ch.logo || FALLBACK_LOGO;

            if(hlsPlayer) { hlsPlayer.destroy(); hlsPlayer = null; }
            if(dashPlayer) { dashPlayer.reset(); dashPlayer = null; }

            // Increment Watch Count Analytics in Cloud
            try {
                const chDocRef = doc(db, "channels", ch.id);
                updateDoc(chDocRef, { views: increment(1) });
            } catch(e) {}

            setupPresenceTrack(ch.name);

            if (ch.url.includes('.mpd')) {
                dashPlayer = dashjs.MediaPlayer().create();
                dashPlayer.initialize(video, ch.url, true);
            } else if (Hls.isSupported()) {
                hlsPlayer = new Hls();
                hlsPlayer.loadSource(ch.url);
                hlsPlayer.attachMedia(video);
            } else {
                video.src = ch.url;
            }
            loader.classList.add('hidden');
        };

        window.reloadStream = function() {
            if(currentChannel) playChannel(encodeURIComponent(JSON.stringify(currentChannel)));
        };

        // --- UI Card Generator ---
        function createCard(ch) {
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.onclick = () => playChannel(encodeURIComponent(JSON.stringify(ch)));
            
            const statusDot = ch.status === 'online' ? 'dot-online' : 'dot-offline';
            card.innerHTML = `
                <span class="health-dot ${statusDot}"></span>
                <img src="${ch.logo || FALLBACK_LOGO}" class="logo-img" onerror="this.src='${FALLBACK_LOGO}'">
                <div class="card-name">${ch.name}</div>
            `;
            return card;
        }

        // --- Data Fetch Engine (Pagination & Trending) ---
        async function loadTrendingNow() {
            const grid = document.getElementById('trendingGrid');
            try {
                const q = query(collection(db, "channels"), orderBy("trendingScore", "desc"), limit(10));
                const snap = await getDocs(q);
                grid.innerHTML = "";
                if(snap.empty) {
                    grid.innerHTML = "<div class='text-muted p-2'>Waiting for channels to sync...</div>";
                    return;
                }
                snap.forEach(doc => {
                    grid.appendChild(createCard({id: doc.id, ...doc.data()}));
                });
            } catch(e) {
                grid.innerHTML = "<div class='text-muted p-2'>Syncing Cloud Setup...</div>";
            }
        }

        window.loadNextBatch = async function() {
            const grid = document.getElementById('allChannelsGrid');
            const btn = document.getElementById('loadMoreBtn');
            btn.innerText = "Loading Cloud...";

            try {
                let q = query(collection(db, "channels"), orderBy("name"), limit(BATCH_LIMIT));
                if (lastVisibleDoc) {
                    q = query(collection(db, "channels"), orderBy("name"), startAfter(lastVisibleDoc), limit(BATCH_LIMIT));
                }

                const snap = await getDocs(q);
                if(snap.docs.length > 0) {
                    lastVisibleDoc = snap.docs[snap.docs.length - 1];
                    snap.forEach(doc => {
                        grid.appendChild(createCard({id: doc.id, ...doc.data()}));
                    });
                }
                btn.innerText = "Load More Channels";
                if(snap.docs.length < BATCH_LIMIT) btn.style.display = 'none';
            } catch(e) {
                btn.innerText = "Syncing Cloud...";
            }
        };

        // --- 🚀 One-Time Auto Cloud Syncer Script ---
        // এটি প্রথমবার রান হয়ে ক্লাউডে ডেটা সাবমিট করবে, ডেটা থাকলে আর রান হবে না।
        async function runAutoCloudSync() {
            try {
                const checkSnap = await getDocs(query(collection(db, "channels"), limit(1)));
                if (!checkSnap.empty) {
                    console.log("Cloud Database already has data. Skipping Auto-Sync.");
                    return;
                }
                
                console.log("Empty Cloud DB detected. Initializing data transfer from playlists...");
                const sources = [
                    "https://iamshajon.com/playlist/fifa.json",
                    "https://iamshajon.com/playlist/sports.json",
                    "https://iamshajon.com/playlist/bangla.json",
                    "https://iamshajon.com/playlist/channels.json"
                ];

                let rawChannels = [];
                for (let url of sources) {
                    try {
                        const res = await fetch(url);
                        const data = await res.json();
                        if (Array.isArray(data)) rawChannels = rawChannels.concat(data);
                    } catch(e) { console.error("Source load failed: " + url); }
                }

                const uniqueUrls = new Set();
                const cleanChannels = [];
                rawChannels.forEach(ch => {
                    if (ch.url && !uniqueUrls.has(ch.url)) {
                        uniqueUrls.add(ch.url);
                        cleanChannels.push({
                            name: ch.name || "Unknown Channel",
                            logo: ch.logo || "",
                            url: ch.url,
                            group: ch.group || "General",
                            status: "online",
                            trendingScore: Math.floor(Math.random() * 80) + 20,
                            views: 0
                        });
                    }
                });

                console.log(`Pushing ${cleanChannels.length} unique channels to Firestore...`);
                let batch = writeBatch(db);
                let count = 0;

                for (let ch of cleanChannels) {
                    const docRef = doc(collection(db, "channels"));
                    batch.set(docRef, ch);
                    count++;

                    if (count % 300 === 0) {
                        await batch.commit();
                        batch = writeBatch(db);
                        console.log(`Uploaded batch ${count}...`);
                    }
                }
                if (count % 300 !== 0) await batch.commit();
                
                console.log("🚀 Sync Done! Reloading lists.");
                loadTrendingNow();
                loadNextBatch();
            } catch(err) {
                console.error("Sync system interrupted: ", err);
            }
        }

        // --- Init Systems ---
        document.addEventListener('DOMContentLoaded', async () => {
            setupPresenceTrack();
            listenLiveUsers();
            await runAutoCloudSync();
            loadTrendingNow();
            loadNextBatch();
        });
    </script>
</body>
</html>
