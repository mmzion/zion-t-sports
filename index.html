<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zion Sports — Ultimate OTT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body { background-color: #04070b; color: #fff; font-family: sans-serif; padding-top: 60px; }
        .theater-screen { position: relative; background: #000; border-radius: 14px; overflow: hidden; width: 100%; aspect-ratio: 16 / 9; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; }
        .channel-list-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .channel-card { background: #111; padding: 15px; border-radius: 10px; cursor: pointer; text-align: center; aspect-ratio: 1.2/1; display: flex; align-items: center; justify-content: center; border: 1px solid #333; }
        .channel-card.active { border: 2px solid #ef4444; }
        .drm-card.active { border: 2px solid #10b981; }
        .card-name { font-weight: 800; font-size: 11px; text-transform: uppercase; }
        @media (max-width: 768px) { .channel-list-row { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>

    <div class="container-fluid">
        <div class="theater-screen">
            <video id="player" playsinline controls></video>
            <video id="shaka-video" class="d-none" playsinline controls></video>
        </div>
        
        <div class="channel-list-row">
            <div class="channel-card drm-card" onclick="switchDrm('https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeebanglacinema/default/manifest.mpd', 'fbbfd9ce4bbe4d818b16df7dfe89f05b', '1e96d0f88ef740e982d6f6105721c8bc', this)">
                <div class="card-name">FIFA<br>BANGLA</div>
            </div>
            <div class="channel-card active" onclick="switchHls('https://1nyaler.streamhostingcdn.top/stream/23/index.m3u8', this)"><div class="card-name">BEIN<br>DIRECT</div></div>
            <div class="channel-card" onclick="switchHls('https://dfr80qz435crc.cloudfront.net/MNOP/Amagi/Caze/Caze_TV_BR/1080p-vtt/index.m3u8', this)"><div class="card-name">CAZE<br>TV</div></div>
            <div class="channel-card" onclick="switchHls('https://tvsen5.aynaott.com/PtvSports/index.m3u8', this)"><div class="card-name">PTV<br>SPORTS</div></div>
            <div class="channel-card" onclick="switchHls('https://1nyaler.streamhostingcdn.top/stream/32/index.m3u8', this)"><div class="card-name">WIN<br>PREMIUM</div></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>

    <script>
        const video = document.getElementById('player');
        const shakaVideo = document.getElementById('shaka-video');
        let hls = null, shakaPlayer = null;

        const player = new Plyr(video, { controls: ['play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'] });

        function switchHls(url, el) {
            document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            
            if(shakaPlayer) shakaPlayer.unload();
            shakaVideo.classList.add('d-none');
            video.classList.remove('d-none');
            
            if (hls) hls.destroy();
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            video.play();
        }

        async function switchDrm(url, keyId, keySecret, el) {
            document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');

            if (hls) hls.destroy();
            video.classList.add('d-none');
            shakaVideo.classList.remove('d-none');

            if (!shakaPlayer) shakaPlayer = new shaka.Player(shakaVideo);
            shakaPlayer.configure({ drm: { clearKeys: { [keyId]: keySecret } } });
            
            await shakaPlayer.load(url);
            shakaVideo.play();
        }

        // Initial Load
        switchHls('https://1nyaler.streamhostingcdn.top/stream/23/index.m3u8', document.querySelector('.channel-card.active'));
    </script>
</body>
</html>
