<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zion Sports — Ultimate FIFA OTT</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <style>
        /* ওটিটি ডার্ক লাক্সারি থিম */
        body {
            background-color: #06090e;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* আল্ট্রা-মিনিমাল টপ বার */
        .ott-nav {
            background: rgba(6, 9, 14, 0.75);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            height: 60px;
            display: flex;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1050;
        }
        .site-brand {
            font-weight: 800;
            font-size: 20px;
            letter-spacing: -0.5px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .site-brand span {
            color: #ef4444;
            font-size: 12px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 1px 6px;
            border-radius: 4px;
            font-weight: 600;
        }

        /* ওটিটি মেইন ড্যাশবোর্ড লেআউট */
        .ott-dashboard {
            margin-top: 60px;
            padding: 20px;
            min-height: calc(100vh - 60px);
        }

        /* অ্যাম্বিয়েন্ট লাইট গ্লো সহ প্লেয়ার কন্টেইনার */
        .theater-screen {
            position: relative;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 
                        0 0 50px rgba(239, 68, 68, 0.05); /* মৃদু অ্যাম্বিয়েন্ট গ্লো */
            transition: box-shadow 0.5s ease;
        }
        
        /* Plyr প্লেয়ার কাস্টমাইজেশন */
        .plyr {
            --plyr-color-main: #ef4444; 
            max-height: 72vh;
            border-radius: 16px;
        }

        /* মডার্ন গ্লাস-মরফিজম সাইডবার প্যানেল */
        .sidebar-panel {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 20px;
            height: 100%;
        }
        .panel-header {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ওটিটি স্টাইল চ্যানেল লিস্ট কার্ডস */
        .channel-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .channel-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .channel-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateX(4px);
        }
        .channel-card.active {
            background: linear-gradient(90deg, rgba(239, 68, 68, 0.15) 0%, rgba(239, 68, 68, 0.03) 100%);
            border-color: #ef4444;
            box-shadow: inset 3px 0 0 #ef4444;
        }
        .card-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .card-icon {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #94a3b8;
            transition: all 0.2s ease;
        }
        .channel-card.active .card-icon {
            background: #ef4444;
            color: #fff;
        }
        .card-name {
            font-weight: 600;
            font-size: 14.5px;
        }
        .status-badge {
            font-size: 10px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
        }
        .channel-card.active .status-badge {
            color: #ef4444;
        }

        /* ডাইনামিক লাইভ মেটাডাটা সেকশন */
        .stream-details {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 16px 20px;
            border-radius: 12px;
        }
        .stream-title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0;
        }
        .badge-live {
            background: #ef4444;
            color: #fff;
            font-size: 10px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            animation: breathe 2s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.97); }
        }

        .stream-meta-tags {
            margin-top: 10px;
            display: flex;
            gap: 15px;
            font-size: 13px;
            color: #64748b;
        }
        .tag-item { display: flex; align-items: center; gap: 4px; }

        /* রেসপনসিভ মোবাইল লেআউট ব্রেকিং */
        @media (max-width: 991px) {
            .sidebar-panel { margin-top: 20px; height: auto; }
            .channel-card:hover { transform: translateY(-2px); }
        }
    </style>
</head>
<body>

    <nav class="ott-nav px-3 px-md-4">
        <div class="site-brand">
            <i class="bi bi-grid-1x2-fill text-danger"></i> Zion Sports <span>FIFA OTT</span>
        </div>
    </nav>

    <div class="container-fluid ott-dashboard">
        <div class="row g-4">
            
            <div class="col-lg-9">
                <div class="theater-screen" id="mainScreen">
                    <video id="player" playsinline controls autoplay muted></video>
                </div>
                
                <div class="stream-details">
                    <h1 class="stream-title">
                        <span class="badge-live">Live</span>
                        <span id="activeTitle">Caze TV — FIFA Broadcast Feed</span>
                    </h1>
                    <div class="stream-meta-tags">
                        <div class="tag-item"><i class="bi bi-shield-check text-success"></i> Premium Stream Connection</div>
                        <div class="tag-item"><i class="bi bi-cpu"></i> HLS Auto-Adaptive Core</div>
                        <div class="tag-item"><i class="bi bi-lightning-charge-fill text-warning"></i> Ultra Low Latency</div>
                    </div>
                </div>
            </div>

            <div class="col-lg-3">
                <div class="sidebar-panel">
                    <div class="panel-header">
                        <i class="bi bi-collection-play"></i> Select Live Feed
                    </div>
                    
                    <div class="channel-list">
                        <div class="channel-card active" onclick="switchChannel('https://dfr80qz435crc.cloudfront.net/MNOP/Amagi/Caze/Caze_TV_BR/1080p-vtt/index.m3u8', 'Caze TV — FIFA Broadcast Feed', this)">
                            <div class="card-info">
                                <div class="card-icon"><i class="bi bi-play-fill"></i></div>
                                <div class="card-name">Caze TV</div>
                            </div>
                            <div class="status-badge">1080p Stream</div>
                        </div>

                        <div class="channel-card" onclick="switchChannel('https://tvsen5.aynaott.com/PtvSports/index.m3u8', 'PTV Sports — FIFA World Matches', this)">
                            <div class="card-info">
                                <div class="card-icon"><i class="bi bi-play-fill"></i></div>
                                <div class="card-name">PTV Sports</div>
                            </div>
                            <div class="status-badge">HD Feed</div>
                        </div>

                        <div class="channel-card" onclick="switchChannel('https://1nyaler.streamhostingcdn.top/stream/23/index.m3u8', 'Bein Sports 1 — Global Football Feed', this)">
                            <div class="card-info">
                                <div class="card-icon"><i class="bi bi-play-fill"></i></div>
                                <div class="card-name">Bein Sports 1</div>
                            </div>
                            <div class="status-badge">Global</div>
                        </div>

                        <div class="channel-card" onclick="switchChannel('https://1nyaler.streamhostingcdn.top/stream/32/index.m3u8', 'WIN Sports — Premium FIFA Stream', this)">
                            <div class="card-info">
                                <div class="card-icon"><i class="bi bi-play-fill"></i></div>
                                <div class="card-name">WIN Sports</div>
                            </div>
                            <div class="status-badge">Premium</div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

    <script>
        let hls = null;
        const video = document.getElementById('player');
        const activeTitle = document.getElementById('activeTitle');
        const mainScreen = document.getElementById('mainScreen');

        // Plyr Engine Setup
        const player = new Plyr(video, {
            autoplay: true,
            muted: true,
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'pip', 'fullscreen'],
            settings: ['quality', 'speed'],
            speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] }
        });

        // HLS Native Injector & Dynamic Resolution Parser
        function playHlsStream(url) {
            if (hls) hls.destroy();

            if (Hls.isSupported()) {
                hls = new Hls({
                    maxBufferLength: 30,
                    enableWorker: true,
                    lowLatencyMode: true
                });
                
                hls.loadSource(url);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, function () {
                    const availableQualities = hls.levels.map((l) => l.height);
                    
                    player.config.quality = {
                        default: availableQualities[0],
                        options: availableQualities,
                        forced: true,
                        onChange: (q) => {
                            hls.levels.forEach((level, id) => {
                                if (level.height === q) hls.currentLevel = id; 
                            });
                        }
                    };

                    // Auto Adaptive Labels on Settings Menu
                    player.on('ready', () => {
                        const qualityMenu = document.querySelectorAll('[data-plyr="quality"]');
                        qualityMenu.forEach(menu => {
                            const labels = menu.querySelectorAll('span');
                            labels.forEach(label => {
                                if (label.textContent === '1080') label.textContent = 'Full HD (1080p)';
                                if (label.textContent === '720') label.textContent = 'HD (720p)';
                                if (label.textContent === '480') label.textContent = 'SD (480p)';
                                if (label.textContent === '360') label.textContent = '360p';
                            });
                        });
                    });
                    
                    video.play().catch(e => console.log("Engine Auto Boot Blocked:", e));
                });
            } 
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', () => {
                    video.play().catch(e => console.log("Engine Auto Boot Blocked:", e));
                });
            }
        }

        // Dashboard Channel Switcher Routing Engine
        function switchChannel(url, title, element) {
            activeTitle.textContent = title;
            
            // সাইডবার কার্ডগুলোর একটিভ স্টেট ম্যানেজমেন্ট
            const cards = document.querySelectorAll('.channel-card');
            cards.forEach(card => card.classList.remove('active'));
            element.classList.add('active');

            // ভিডিও স্ক্রিনে অ্যাম্বিয়েন্ট পালস ফ্ল্যাশ থ্রো করা
            mainScreen.style.boxShadow = '0 30px 60px rgba(0, 0, 0, 0.8), 0 0 50px rgba(239, 68, 68, 0.3)';
            setTimeout(() => { 
                mainScreen.style.boxShadow = '0 30px 60px rgba(0, 0, 0, 0.8), 0 0 50px rgba(239, 68, 68, 0.05)'; 
            }, 600);

            playHlsStream(url);
        }

        // Initial default boot on load
        document.addEventListener('DOMContentLoaded', () => {
            const defaultUrl = 'https://dfr80qz435crc.cloudfront.net/MNOP/Amagi/Caze/Caze_TV_BR/1080p-vtt/index.m3u8';
            playHlsStream(defaultUrl);
        });
    </script>
</body>
</html>
