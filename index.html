<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zion Sports — Ultimate OTT</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <style>
        /* Luxury OTT Dark Theme */
        body {
            background-color: #04070b;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            padding-top: 60px;
        }

        /* Ultra-Minimal Top Bar */
        .ott-nav {
            background: rgba(4, 7, 11, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            height: 60px;
            display: flex;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1050;
        }
        .site-brand {
            font-weight: 800;
            font-size: 20px;
            letter-spacing: -0.5px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .site-brand span {
            color: #ef4444;
            font-size: 11px;
            border: 1px solid rgba(239, 68, 68, 0.25);
            padding: 1px 6px;
            border-radius: 4px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* OTT Dashboard Grid */
        .ott-dashboard {
            padding: 24px;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Theater Screen Frame (16:9 Aspect Ratio) */
        .theater-screen {
            position: relative;
            background: #000;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            width: 100%;
            aspect-ratio: 16 / 9;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .plyr {
            width: 100%;
            height: 100%;
        }
        .plyr--video {
            background: #000;
        }

        /* Interactive Side Panel */
        .sidebar-panel {
            background: rgba(13, 18, 28, 0.45);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        
        .panel-header {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Scroll Area */
        .channel-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            padding-right: 4px;
        }
        
        .channel-list::-webkit-scrollbar {
            width: 4px;
        }
        .channel-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        /* Premium Channel Cards */
        .channel-card {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 12px 14px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .channel-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateX(2px);
        }
        .channel-card.active {
            background: linear-gradient(90deg, rgba(239, 68, 68, 0.12) 0%, rgba(239, 68, 68, 0.02) 100%);
            border-color: #ef4444;
        }
        
        /* Redirect Card Style Customization */
        .channel-card.redirect-card:hover {
            border-color: #f59e0b;
            background: rgba(245, 158, 11, 0.05);
        }

        .card-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-icon {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #94a3b8;
        }
        .channel-card.active .card-icon {
            background: #ef4444;
            color: #fff;
        }
        .card-name {
            font-weight: 600;
            font-size: 14px;
            letter-spacing: -0.1px;
        }
        .status-badge {
            font-size: 10px;
            font-weight: 700;
            color: #475569;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .channel-card.active .status-badge {
            color: #ef4444;
        }
        .pulse-dot {
            width: 6px;
            height: 6px;
            background-color: #ef4444;
            border-radius: 50%;
            display: inline-block;
            animation: blink 1.5s infinite;
        }
        .redirect-card .pulse-dot {
            background-color: #f59e0b;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Stream Information Section */
        .stream-details {
            margin-top: 20px;
            background: rgba(13, 18, 28, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.02);
            padding: 16px 20px;
            border-radius: 12px;
        }
        .stream-title {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0;
        }
        .badge-live {
            background: #ef4444;
            color: #fff;
            font-size: 10px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }
        .stream-meta-tags {
            margin-top: 8px;
            display: flex;
            gap: 15px;
            font-size: 13px;
            color: #475569;
        }
        .tag-item { display: flex; align-items: center; gap: 4px; }

        /* Responsive Calculation */
        @media (min-width: 992px) {
            .dashboard-row {
                display: flex;
                align-items: stretch;
            }
            .sidebar-panel {
                height: 100%;
                max-height: calc(16 / 9 * 100%);
            }
            .channel-list {
                height: 0;
                flex-grow: 1;
            }
        }
        
        @media (max-width: 991px) {
            .theater-screen { aspect-ratio: auto; height: 210px; }
            .sidebar-panel { margin-top: 16px; }
            .channel-list { max-height: 300px; }
        }
    </style>
</head>
<body>

    <nav class="ott-nav px-3 px-md-4">
        <div class="site-brand">
            <i class="bi bi-play-hd-fill text-danger"></i> Zion Sports <span>LIVE HUB</span>
        </div>
    </nav>

    <div class="container-fluid ott-dashboard">
        <div class="row g-4 dashboard-row">
            
            <div class="col-lg-9 d-flex flex-column">
                <div class="theater-screen">
                    <video id="player" playsinline controls autoplay muted></video>
                </div>
                
                <div class="stream-details">
                    <h1 class="stream-title">
                        <span class="badge-live">Live</span>
                        <span id="activeTitle">Caze TV — FIFA Broadcast Feed</span>
                    </h1>
                    <div class="stream-meta-tags">
                        <div class="tag-item"><i class="bi bi-globe"></i> Global Feed Connection</div>
                        <div class="tag-item"><i class="bi bi-cpu"></i> Auto-Resolution Core</div>
                        <div class="tag-item"><i class="bi bi-lightning-charge"></i> Ultra Low Latency</div>
                    </div>
                </div>
            </div>

            <div class="col-lg-3">
                <div class="sidebar-panel">
                    <div class="panel-header">
                        <i class="bi bi-collection-play-fill"></i> Select Channel
                    </div>
                    
                    <div class="channel-list">
                        <div class="channel-card active" onclick="switchChannel('https://dfr80qz435crc.cloudfront.net/MNOP/Amagi/Caze/Caze_TV_BR/1080p-vtt/index.m3u8', 'Caze TV — FIFA Broadcast Feed', this)">
                            <div class="card-info">
                                <div class="card-icon"><i class="bi bi-tv"></i></div>
                                <div class="card-name">Caze TV</div>
                            </div>
                            <div class="status-badge"><span class="pulse-dot"></span> 1080p</div>
                        </div>

                        <div class="channel-card" onclick="switchChannel('https://tvsen5.aynaott.com/PtvSports/index.m3u8', 'PTV Sports — FIFA World Matches', this)">
                            <div class="card-info">
                                <div class="card-icon"><i class="bi bi-tv"></i></div>
                                <div class="card-name">PTV Sports</div>
                            </div>
                            <div class="status-badge"><span class="pulse-dot"></span> Live</div>
                        </div>

                        <div class="channel-card" onclick="switchChannel('https://1nyaler.streamhostingcdn.top/stream/23/index.m3u8', 'Bein Sports 1 — Global Football Feed', this)">
                            <div class="card-info">
                                <div class="card-icon"><i class="bi bi-tv"></i></div>
                                <div class="card-name">Bein Sports 1</div>
                            </div>
                            <div class="status-badge"><span class="pulse-dot"></span> HD</div>
                        </div>

                        <div class="channel-card" onclick="switchChannel('https://1nyaler.streamhostingcdn.top/stream/32/index.m3u8', 'WIN Sports — Premium FIFA Stream', this)">
                            <div class="card-info">
                                <div class="card-icon"><i class="bi bi-tv"></i></div>
                                <div class="card-name">WIN Sports</div>
                            </div>
                            <div class="status-badge"><span class="pulse-dot"></span> Premium</div>
                        </div>

                        <div class="channel-card redirect-card" onclick="window.open('http://103.59.176.72:8083/live1/tracks-v1a1/mono.m3u8?token=123', '_blank')">
                            <div class="card-info">
                                <div class="card-info">
                                    <div class="card-icon"><i class="bi bi-box-arrow-up-right text-warning"></i></div>
                                    <div class="card-name">T Sports 2</div>
                                </div>
                            </div>
                            <div class="status-badge"><span class="pulse-dot"></span> External</div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

    <script>
        let hls = null;
        const video = document.getElementById('player');
        const activeTitle = document.getElementById('activeTitle');

        // Plyr Setup
        const player = new Plyr(video, {
            autoplay: true,
            muted: true,
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'pip', 'fullscreen'],
            settings: ['quality', 'speed'],
            speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] }
        });

        // Core HLS Parser
        function playHlsStream(url) {
            if (hls) hls.destroy();

            if (Hls.isSupported()) {
                hls = new Hls({
                    maxBufferLength: 30,
                    enableWorker: true,
                    lowLatencyMode: true
                });
                
                hls.loadSource(url);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, function () {
                    const availableQualities = hls.levels.map((l) => l.height);
                    
                    player.config.quality = {
                        default: availableQualities[0],
                        options: availableQualities,
                        forced: true,
                        onChange: (q) => {
                            hls.levels.forEach((level, id) => {
                                if (level.height === q) hls.currentLevel = id; 
                            });
                        }
                    };

                    player.on('ready', () => {
                        const qualityMenu = document.querySelectorAll('[data-plyr="quality"]');
                        qualityMenu.forEach(menu => {
                            const labels = menu.querySelectorAll('span');
                            labels.forEach(label => {
                                if (label.textContent === '1080') label.textContent = 'Full HD (1080p)';
                                if (label.textContent === '720') label.textContent = 'HD (720p)';
                                if (label.textContent === '480') label.textContent = 'SD (480p)';
                                if (label.textContent === '360') label.textContent = '360p';
                            });
                        });
                    });
                    
                    video.play().catch(e => console.log("Autoplay Engine:", e));
                });
            } 
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', () => {
                    video.play().catch(e => console.log("Autoplay Engine:", e));
                });
            }
        }

        // Switching Engine Router (Only for internal streams)
        function switchChannel(url, title, element) {
            activeTitle.textContent = title;
            
            const cards = document.querySelectorAll('.channel-card');
            cards.forEach(card => card.classList.remove('active'));
            element.classList.add('active');

            playHlsStream(url);
        }

        // Boot Loader
        document.addEventListener('DOMContentLoaded', () => {
            const defaultUrl = 'https://dfr80qz435crc.cloudfront.net/MNOP/Amagi/Caze/Caze_TV_BR/1080p-vtt/index.m3u8';
            playHlsStream(defaultUrl);
        });
    </script>
</body>
</html>
